<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Website</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-gray-800 p-6 flex justify-between items-center">
        <h1 class="text-white text-2xl md:text-4xl font-bold">Meine Website</h1>
        <input type="checkbox" id="menu-toggle" class="hidden peer">
        <label for="menu-toggle" class="md:hidden cursor-pointer flex flex-col space-y-1">
            <span class="w-6 h-0.5 bg-white transition-all duration-300 peer-checked:rotate-45 peer-checked:translate-y-1.5"></span>
            <span class="w-6 h-0.5 bg-white transition-all duration-300 peer-checked:opacity-0"></span>
            <span class="w-6 h-0.5 bg-white transition-all duration-300 peer-checked:-rotate-45 peer-checked:-translate-y-1.5"></span>
        </label>
        <nav class="hidden md:flex peer-checked:flex absolute md:relative top-full md:top-auto left-0 md:left-auto w-full md:w-auto bg-gray-800 md:bg-transparent p-4 md:p-0">
            <ul class="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-6">
                <li><a href="#" class="text-lg md:text-2xl text-white hover:text-blue-400 transition-colors duration-300 transform hover:scale-105">Startseite</a></li>
                <li><a href="#" class="text-lg md:text-2xl text-white hover:text-blue-400 transition-colors duration-300 transform hover:scale-105">Über uns</a></li>
                <li><a href="#" class="text-lg md:text-2xl text-white hover:text-blue-400 transition-colors duration-300 transform hover:scale-105">Dienstleistungen</a></li>
                <li><a href="#" class="text-lg md:text-2xl text-white hover:text-blue-400 transition-colors duration-300 transform hover:scale-105">Kontakt</a></li>
            </ul>
        </nav>
        <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition duration-300 hidden md:block">Anmelden</button>
    </header>
    <main class="w-full bg-[url('crystalweed-cannabis-uJbBflPXzzM-unsplash.jpg')] bg-cover bg-center bg-no-repeat min-h-screen flex items-center justify-center filter brightness-75">
       <h2 class="text-white text-2xl md:text-4xl font-bold text-center py-16 px-4">Willkommen auf meiner Website</h2>
    </main>
    <footer class="bg-gray-800 p-4 text-white text-lg md:text-2xl flex flex-col md:flex-row justify-between items-center">
        <div class="text-sm md:text-xl mb-2 md:mb-0 md:ml-8">&copy; 2026 Meine Website. Alle Rechte vorbehalten.</div>
        <div class="md:mr-8">
            <ul class="flex flex-col md:flex-row space-y-1 md:space-y-0 md:space-x-4">
                <li>
                    <a href="#" class="text-white hover:text-blue-400 transition-colors duration-300">Datenschutz</a></li>
                </li>
                <li>
                    <a href="#" class="text-white hover:text-blue-400 transition-colors duration-300">Nutzungsbedingungen</a>
                </li>
            </ul>
        </div>
    </footer>
    <script>
        document.getElementById('menu-toggle').addEventListener('change', function() {
            const nav = document.querySelector('nav');
            if (this.checked) {
                nav.classList.remove('hidden');
            } else {
                nav.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
